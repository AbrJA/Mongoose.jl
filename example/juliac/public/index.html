<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mongoose.jl</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        a {
            display: inline-block;
            padding: 15px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 1.05em;
        }
        a:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .endpoint {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 6px;
            margin-top: 30px;
            text-align: left;
        }
        .endpoint h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Mongoose.jl</h1>
        <p>Production-ready HTTP & WebSocket framework for Julia</p>

        <div class="links">
            <a href="/static/test.html">📊 Test Dashboard</a>
            <a href="/health">🔍 Health Check</a>
            <a href="/static/">📁 Static Files</a>
        </div>

        <div class="endpoint">
            <h3>Quick Links</h3>
            <p><code>GET /health</code> - Health check</p>
            <p><code>GET /hello</code> - Hello endpoint</p>
            <p><code>GET /user/:id</code> - Typed parameter example</p>
            <p><code>WS /ws/chat</code> - WebSocket endpoint</p>
        </div>
    </div>
</body>
</html>
